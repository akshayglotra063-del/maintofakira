<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मैं तो फ़कीरा — Muntzir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600&family=Cinzel:wght@400;600&family=Noto+Serif+Devanagari:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --amber: #C8832A;
    --amber-light: #E9A84C;
    --dark: #0E0A06;
    --cream: #F0E2C4;
  }

  body {
    background: var(--dark);
    color: var(--cream);
    margin: 0;
    font-family: 'EB Garamond', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    overflow-x: hidden;
  }

  /* ── CUSTOM PLAYER BOX ── */
  .player-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(200, 131, 42, 0.2);
    padding: 40px;
    border-radius: 20px;
    max-width: 400px;
    width: 90%;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .artist-label {
    font-family: 'Cinzel', serif;
    letter-spacing: 4px;
    color: var(--amber);
    font-size: 12px;
    margin-bottom: 10px;
  }

  .song-title {
    font-family: 'Noto Serif Devanagari', serif;
    font-size: 32px;
    margin: 10px 0;
  }

  /* ── THE LISTEN BUTTON ── */
  .listen-now-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--amber);
    color: var(--dark);
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    padding: 18px 40px;
    border-radius: 50px;
    margin-top: 30px;
    transition: 0.3s all ease;
    box-shadow: 0 10px 20px rgba(200, 131, 42, 0.3);
    font-size: 14px;
    letter-spacing: 2px;
  }

  .listen-now-btn:hover {
    background: var(--amber-light);
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(200, 131, 42, 0.5);
  }

  .play-icon {
    margin-right: 12px;
    font-size: 18px;
  }

  /* ── SPARKS ── */
  .spark {
    position: absolute;
    width: 2px; height: 6px;
    background: var(--amber);
    animation: fly 3s linear infinite;
    opacity: 0;
  }

  @keyframes fly {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-200px); opacity: 0; }
  }
</style>
</head>
<body>

  <div id="sparks-container"></div>

  <div class="player-card">
    <p class="artist-label">Muntzir Presents</p>
    <h1 class="song-title">मैं तो फ़कीरा</h1>
    <p style="font-style: italic; opacity: 0.7;">Main to Fakira, Tu Meri Jaan Hai</p>

    <a href="https://songdew.com/songs/main-to-fakira-tera-121639" target="_blank" class="listen-now-btn">
      <span class="play-icon">▶</span> LISTEN ON SONGDEW
    </a>

    <div style="margin-top: 30px; display: flex; justify-content: center; gap: 15px;">
        <span style="font-size: 11px; color: var(--amber); letter-spacing: 1px;">SPOTIFY</span>
        <span style="font-size: 11px; color: var(--amber); letter-spacing: 1px;">YOUTUBE</span>
        <span style="font-size: 11px; color: var(--amber); letter-spacing: 1px;">APPLE</span>
    </div>
  </div>

  <script>
    // Simple sparks effect
    const container = document.getElementById('sparks-container');
    for (let i = 0; i < 15; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = '90vh';
      s.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(s);
    }
  </script>

</body>
</html>
